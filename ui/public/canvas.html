<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
    <title>PEAK Spray Canvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        #sprayCanvas {
            width: 100%;
            height: 100%;
            display: block;
            background: transparent;
        }
    </style>
</head>

<body>
    <canvas id="sprayCanvas"></canvas>
    <script src="./canvas.js"></script>
</body>

</html>
